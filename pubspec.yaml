name: flutter_app_trabalho
description: "Projeto de gestão de produção e receitas."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.10.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.7.0
  shared_preferences: ^2.3.0
  provider: ^6.1.1
  flutter_speed_dial: ^7.0.0
  http: ^1.1.0 
  go_router: ^14.0.0
  image_picker: ^1.0.7
  path: ^1.8.3
  permission_handler: ^12.0.1
  share_plus: ^13.1.0
  lottie: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: "^0.13.1"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/animations/
    